<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SVS — AR Architecture</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Helvetica Neue',sans-serif; }

#video { 
  position:fixed; top:0; left:0; 
  width:100vw; height:100vh; 
  object-fit:cover; 
  z-index:1;
}

#canvas3d {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  z-index:2;
  pointer-events:none;
}

#ui {
  position:fixed; bottom:0; left:0; right:0;
  z-index:10;
  padding:12px;
}

#hint-box {
  background:rgba(6,12,26,0.88);
  border:1px solid rgba(26,110,245,0.4);
  border-radius:18px;
  padding:16px 20px;
  text-align:center;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
#hint-box .icon { font-size:28px; margin-bottom:6px; }
#hint-box h3 { color:#fff; font-size:15px; font-weight:700; margin-bottom:4px; }
#hint-box p { color:#7a93b8; font-size:12px; line-height:1.5; }
#hint-box .status {
  display:inline-block;
  background:rgba(0,201,167,0.12);
  border:1px solid rgba(0,201,167,0.35);
  color:#00c9a7;
  font-size:11px;
  padding:4px 14px;
  border-radius:6px;
  margin-top:10px;
  font-family:monospace;
}

#info-popup {
  display:none;
  background:rgba(6,12,26,0.92);
  border:1px solid rgba(26,110,245,0.35);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
#info-popup .close { float:right; color:#7a93b8; font-size:20px; cursor:pointer; line-height:1; }
#info-popup h3 { color:#6fa8ff; font-size:13px; font-weight:700; margin-bottom:6px; }
#info-popup p { color:#a0b4cc; font-size:12px; line-height:1.6; }

#cam-error {
  display:none;
  position:fixed; inset:0;
  background:#060c1a;
  z-index:99;
  align-items:center; justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px;
}
#cam-error h2 { color:#fff; font-size:20px; margin-bottom:10px; }
#cam-error p { color:#7a93b8; font-size:13px; line-height:1.7; margin-bottom:20px; }
.fix-btn {
  background:rgba(26,110,245,0.15);
  border:1px solid rgba(26,110,245,0.4);
  color:#6fa8ff;
  padding:12px 28px;
  border-radius:100px;
  font-size:14px;
  cursor:pointer;
  display:inline-block;
  margin:6px;
}

/* TAP BUTTONS — overlaid on canvas */
#tap-layer {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  z-index:5;
}
.tap-zone {
  position:absolute;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas3d"></canvas>
<div id="tap-layer"></div>

<div id="cam-error">
  <div style="font-size:48px;margin-bottom:16px">📷</div>
  <h2>Allow Camera Access</h2>
  <p>
    On iPhone: Go to <strong style="color:#fff">Settings → Safari → Camera</strong> → set to <strong style="color:#fff">"Allow"</strong><br><br>
    Then come back and refresh this page.
  </p>
  <span class="fix-btn" onclick="startCamera()">Try Again</span>
</div>

<div id="ui">
  <div id="info-popup">
    <span class="close" onclick="closeInfo()">×</span>
    <h3 id="popup-title"></h3>
    <p id="popup-desc"></p>
  </div>
  <div id="hint-box">
    <div class="icon">🏗️</div>
    <h3>SVS Architecture — Live AR</h3>
    <p>The 3D architecture is floating in front of you.<br>Move your phone around to explore it. Tap any layer!</p>
    <div class="status" id="status-text">📷 Starting camera...</div>
  </div>
</div>

<script>
// ─── LAYER DATA ───────────────────────────────────────────
const LAYERS = [
  {
    id: 'sources',
    label: 'DATA SOURCES',
    color: [0, 201, 167],
    y: -1.8,
    cards: [
      { label: 'JOB\nPOSTINGS', sub: 'LinkedIn·Indeed', color: [0,201,167] },
      { label: '10-K\nFILINGS',  sub: 'SEC.gov', color: [111,168,255] },
      { label: 'MARKET\nDATA',   sub: 'Yahoo Finance', color: [245,166,35] }
    ],
    info: { title:'📊 Layer 1 — Data Sources', desc:'Three real-time public data streams: Job postings track AI-replaceable role drops. 10-K SEC filings detect rising AI adoption language. Yahoo Finance flags volume spikes without price movement.' }
  },
  {
    id: 'agents',
    label: 'AI AGENTS',
    color: [111, 168, 255],
    y: -0.6,
    cards: [
      { label: 'LABOR\nAGENT',    sub: 'w=0.40 · 8.2', color: [0,201,167] },
      { label: 'DOCUMENT\nAGENT', sub: 'w=0.35 · 7.9', color: [111,168,255] },
      { label: 'MARKET\nAGENT',   sub: 'w=0.25 · 6.8', color: [245,166,35] }
    ],
    info: { title:'🤖 Layer 2 — AI Agents', desc:'Three specialized LLM agents each output a 0–10 disruption score. Labor Agent (weight 0.40) detects job collapse. Document Agent (0.35) reads filings. Market Agent (0.25) detects smart-money exit.' }
  },
  {
    id: 'svs',
    label: 'SVS SCORE',
    color: [245, 166, 35],
    y: 0.6,
    cards: [
      { label: 'SVS\n7.9', sub: '🔴 ALERT', color: [230,57,70] }
    ],
    info: { title:'⚡ SVS Score — 7.9 ALERT', desc:'SVS = (8.2×0.40) + (7.9×0.35) + (6.8×0.25) = 7.9. Threshold: SVS > 7.0 = Sector Alert. SVS > 8.5 = Critical Warning. SaaS sector is in the danger zone.' }
  },
  {
    id: 'alert',
    label: 'ALERT SYSTEM',
    color: [230, 57, 70],
    y: 1.5,
    cards: [
      { label: '⚠ >7.0\nALERT',    sub: 'Watch list', color: [249,194,46] },
      { label: '🔴 >8.5\nCRITICAL', sub: 'Basel IV P2', color: [230,57,70] }
    ],
    info: { title:'🚨 Layer 4 — Alert System', desc:'SVS > 7.0 activates Sector Alert: reduce exposure 30%, increase capital buffer, activate watch list. SVS > 8.5 triggers Critical: immediate supervisory notification + Basel IV Pillar 2 escalation.' }
  },
  {
    id: 'prevention',
    label: 'PREVENTION',
    color: [26, 110, 245],
    y: 2.4,
    cards: [
      { label: '📉 REDUCE\nEXPOSURE', sub: '−30%', color: [26,110,245] },
      { label: '🏦 CAPITAL\nBUFFER',  sub: 'Increase', color: [26,110,245] },
      { label: '🏛️ REG\nFLAG',       sub: 'Pillar 2', color: [26,110,245] }
    ],
    info: { title:'🛡️ Layer 5 — Prevention Actions', desc:'Automated prevention: Reduce sector portfolio weight by 30%. Raise capital provisions per Basel IV. Flag for supervisory stress test. All triggered automatically when SVS crosses thresholds.' }
  }
];

// ─── CANVAS + 3D SETUP ────────────────────────────────────
const canvas = document.getElementById('canvas3d');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let camActive = false;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  buildTapZones();
}
resize();
window.addEventListener('resize', resize);

// ─── CAMERA ───────────────────────────────────────────────
const video = document.getElementById('video');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
    camActive = true;
    document.getElementById('cam-error').style.display = 'none';
    document.getElementById('status-text').textContent = '✓ Camera active — tap any layer!';
    requestAnimationFrame(render);
  } catch(e) {
    document.getElementById('cam-error').style.display = 'flex';
    console.error('Camera error:', e);
  }
}

startCamera();

// ─── 3D PROJECTION ────────────────────────────────────────
const FOV = 600;
function project(x, y, z) {
  const scale = FOV / (FOV + z);
  return {
    x: cx + x * scale,
    y: cy + y * scale,
    scale
  };
}

// ─── DRAW A FLOATING CARD ─────────────────────────────────
function drawCard(x3, y3, z3, w, h, color, label, sub, alpha) {
  const p = project(x3, y3, z3);
  const pw = w * p.scale;
  const ph = h * p.scale;
  const px = p.x - pw/2;
  const py = p.y - ph/2;

  const r = color[0], g = color[1], b = color[2];

  // Shadow/glow
  ctx.shadowColor = `rgba(${r},${g},${b},0.5)`;
  ctx.shadowBlur = 18 * p.scale;

  // Card body
  ctx.globalAlpha = alpha * 0.92;
  ctx.fillStyle = `rgba(10,25,50,0.88)`;
  roundRect(ctx, px, py, pw, ph, 8 * p.scale);
  ctx.fill();

  // Top accent bar
  ctx.globalAlpha = alpha;
  ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
  roundRect(ctx, px, py, pw, 3 * p.scale, 2 * p.scale);
  ctx.fill();

  // Border
  ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
  ctx.lineWidth = 0.8 * p.scale;
  ctx.globalAlpha = alpha * 0.7;
  roundRect(ctx, px, py, pw, ph, 8 * p.scale);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = alpha;

  // Label text
  const lines = label.split('\n');
  const fs = Math.max(9, 13 * p.scale);
  ctx.font = `700 ${fs}px 'Helvetica Neue', sans-serif`;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.textAlign = 'center';
  const lineH = fs * 1.3;
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    ctx.fillText(line, p.x, py + ph * 0.35 + i * lineH - totalH/2 + lineH);
  });

  // Sub text
  const sfs = Math.max(7, 10 * p.scale);
  ctx.font = `400 ${sfs}px 'Helvetica Neue', sans-serif`;
  ctx.fillStyle = 'rgba(160,180,210,0.9)';
  ctx.fillText(sub, p.x, py + ph - 8 * p.scale);

  ctx.globalAlpha = 1;
  return { px, py, pw, ph };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ─── DRAW CONNECTOR LINE ──────────────────────────────────
function drawLine(x1,y1,z1, x2,y2,z2, color, alpha) {
  const p1 = project(x1,y1,z1);
  const p2 = project(x2,y2,z2);
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = alpha;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ─── DRAW LAYER LABEL ─────────────────────────────────────
function drawLabel(x3, y3, z3, text, color) {
  const p = project(x3, y3, z3);
  const fs = Math.max(8, 11 * p.scale);
  ctx.font = `700 ${fs}px 'Helvetica Neue', sans-serif`;
  ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},0.8)`;
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0.08em';
  ctx.fillText(text, p.x - 160 * p.scale, p.y);
  ctx.letterSpacing = '0';
}

// ─── TAP ZONES ────────────────────────────────────────────
let tapZones = [];

function buildTapZones() {
  const layer = document.getElementById('tap-layer');
  layer.innerHTML = '';
  tapZones = [];

  LAYERS.forEach((lyr, li) => {
    const t = 0;
    const bobY = Math.sin(t + li) * 8;
    const z = -200;
    const yBase = (lyr.y * 90) + bobY;
    const numCards = lyr.cards.length;
    const spacing = 130;
    const totalW = (numCards-1) * spacing;

    lyr.cards.forEach((card, ci) => {
      const x3 = (ci - (numCards-1)/2) * spacing;
      const p = project(x3, yBase, z);
      const pw = 110 * p.scale;
      const ph = 80 * p.scale;

      const div = document.createElement('div');
      div.className = 'tap-zone';
      div.style.left = (p.x - pw/2) + 'px';
      div.style.top  = (p.y - ph/2) + 'px';
      div.style.width  = pw + 'px';
      div.style.height = ph + 'px';
      div.onclick = () => showInfo(lyr.info.title, lyr.info.desc);
      layer.appendChild(div);
      tapZones.push(div);
    });
  });
}

// ─── MAIN RENDER LOOP ─────────────────────────────────────
function render(ts) {
  time = ts * 0.001;
  ctx.clearRect(0, 0, W, H);

  // Gentle camera sway using device or time
  const camX = Math.sin(time * 0.3) * 15;
  const camY = Math.cos(time * 0.2) * 8;

  // Draw connector lines between layers
  for (let li = 0; li < LAYERS.length - 1; li++) {
    const lA = LAYERS[li];
    const lB = LAYERS[li+1];
    const bobA = Math.sin(time * 1.1 + li * 0.8) * 8;
    const bobB = Math.sin(time * 1.1 + (li+1) * 0.8) * 8;
    const yA = lA.y * 90 + bobA + camY;
    const yB = lB.y * 90 + bobB + camY;
    drawLine(camX, yA, -200, camX, yB, -200, [255,255,255], 0.12);
  }

  // Draw each layer
  LAYERS.forEach((lyr, li) => {
    const bob = Math.sin(time * 1.1 + li * 0.8) * 8;
    const yBase = lyr.y * 90 + bob + camY;
    const numCards = lyr.cards.length;

    // Layer label
    drawLabel(-155 + camX, yBase - 52, -200, lyr.label, lyr.color);

    // Separator line
    const pL = project(-140 + camX, yBase - 42, -200);
    const pR = project( 140 + camX, yBase - 42, -200);
    ctx.beginPath();
    ctx.moveTo(pL.x, pL.y);
    ctx.lineTo(pR.x, pR.y);
    ctx.strokeStyle = `rgba(${lyr.color[0]},${lyr.color[1]},${lyr.color[2]},0.25)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Cards
    lyr.cards.forEach((card, ci) => {
      const spacing = numCards > 1 ? 130 : 0;
      const x3 = (ci - (numCards-1)/2) * spacing + camX;
      const cardBob = Math.sin(time * 1.3 + li * 0.8 + ci * 0.4) * 4;
      const y3 = yBase + cardBob;
      drawCard(x3, y3, -200, 110, 80, card.color, card.label, card.sub, 0.95);
    });

    // Pulse dot
    const pulseAlpha = (Math.sin(time * 2 + li) * 0.5 + 0.5) * 0.8;
    const pd = project(camX, yBase - 42, -200);
    ctx.beginPath();
    ctx.arc(pL.x - 8, pL.y, 3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${lyr.color[0]},${lyr.color[1]},${lyr.color[2]},${pulseAlpha})`;
    ctx.fill();
  });

  // Update tap zones to match animation
  updateTapZones(camY);

  requestAnimationFrame(render);
}

function updateTapZones(camY) {
  let idx = 0;
  LAYERS.forEach((lyr, li) => {
    const bob = Math.sin(time * 1.1 + li * 0.8) * 8;
    const yBase = lyr.y * 90 + bob + camY;
    const numCards = lyr.cards.length;

    lyr.cards.forEach((card, ci) => {
      const spacing = numCards > 1 ? 130 : 0;
      const x3 = (ci - (numCards-1)/2) * spacing;
      const p = project(x3, yBase, -200);
      const pw = 110 * p.scale;
      const ph = 80 * p.scale;
      if (tapZones[idx]) {
        tapZones[idx].style.left = (p.x - pw/2) + 'px';
        tapZones[idx].style.top  = (p.y - ph/2) + 'px';
        tapZones[idx].style.width  = pw + 'px';
        tapZones[idx].style.height = ph + 'px';
      }
      idx++;
    });
  });
}

// ─── INFO POPUP ───────────────────────────────────────────
function showInfo(title, desc) {
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-desc').textContent  = desc;
  document.getElementById('info-popup').style.display = 'block';
}
function closeInfo() {
  document.getElementById('info-popup').style.display = 'none';
}

// ─── DEVICE TILT (bonus immersion) ────────────────────────
let tiltX = 0, tiltY = 0;
window.addEventListener('deviceorientation', (e) => {
  tiltX = (e.gamma || 0) * 0.5;
  tiltY = (e.beta  || 0) * 0.3;
});
</script>
</body>
